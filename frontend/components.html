<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneMate Components | Drone Parts Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-y-auto">

    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-drone text-white text-xl"></i></div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">DroneMate</h1>
        </div>
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Chat</a>
            <a href="#" class="text-sm font-medium text-white transition-colors">Components</a>
            <a href="guides.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Guides</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <header class="flex items-end justify-between">
            <div class="space-y-1">
                <h2 class="text-3xl font-bold text-white">Component Database</h2>
                <p class="text-slate-400">Browse and compare the best drone parts for your next build.</p>
            </div>
            <div class="flex gap-4">
                <input id="search-input" type="text" placeholder="Search parts..." class="bg-slate-800 border-white/5 rounded-xl px-4 py-2 text-sm focus:ring-blue-600 focus:border-blue-600">
                <select id="type-filter" class="bg-slate-800 border-white/5 rounded-xl px-4 py-2 text-sm text-slate-400">
                    <option value="">All Types</option>
                    <option value="motor">Motors</option>
                    <option value="flight_controller">Flight Controllers</option>
                    <option value="esc">ESCs</option>
                    <option value="battery">Batteries</option>
                    <option value="frame">Frames</option>
                </select>
            </div>
        </header>

        <section id="components-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Components will be loaded here -->
            <div class="animate-pulse glass-panel rounded-3xl h-64"></div>
            <div class="animate-pulse glass-panel rounded-3xl h-64"></div>
            <div class="animate-pulse glass-panel rounded-3xl h-64"></div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
</body>
</html>

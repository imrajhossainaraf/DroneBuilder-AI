<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneMate | AI-Powered Drone Assistant</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate-900 */
        }
        .chat-container {
            height: calc(100vh - 12rem);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-hidden">

    <!-- Navigation Bar -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i class="fas fa-drone text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">DroneMate</h1>
        </div>
        <div class="flex items-center gap-6">
            <a href="#" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Chat</a>
            <a href="components.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Components</a>
            <a href="guides.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Guides</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-12 gap-6 p-6 h-full">
        <!-- Left Sidebar: Recent Conversations / Suggested Questions -->
        <aside class="col-span-3 flex flex-col gap-6">
            <div class="glass-panel rounded-2xl p-5">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-4">Suggested Questions</h2>
                <div id="suggested-questions" class="flex flex-col gap-2">
                    <!-- Suggestions will be injected here -->
                </div>
            </div>
            <div class="glass-panel rounded-2xl p-5 flex-grow overflow-y-auto">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-4">Recent Conversations</h2>
                <div id="conversation-history" class="space-y-3">
                    <!-- History will be injected here -->
                    <div class="text-sm text-slate-500 italic">No recent chats yet.</div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <section class="col-span-9 flex flex-col gap-4">
            <div id="chat-messages" class="chat-container glass-panel rounded-3xl p-6 overflow-y-auto flex flex-col gap-6">
                <!-- Welcome Message -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-robot text-xs text-white"></i>
                    </div>
                    <div class="space-y-2 max-w-[85%]">
                        <div class="text-sm font-medium text-slate-400">DroneMate</div>
                        <div class="bg-slate-800/50 p-4 rounded-2xl rounded-tl-none border border-white/5">
                            <p class="leading-relaxed">Hello! I'm DroneMate, your AI drone assistant. Whether you're building your first 5-inch racer or troubleshooting an arming issue, I'm here to help. What's on your mind?</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="glass-panel rounded-2xl p-3 flex flex-col sm:flex-row sm:items-center gap-3 border border-white/10 shadow-2xl">
                <div class="flex flex-wrap items-center gap-2 shrink-0 px-1 order-2 sm:order-1">
                    <label for="ai-provider-select" class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 whitespace-nowrap">AI</label>
                    <select id="ai-provider-select" title="Where to get the answer"
                        class="bg-slate-800/90 text-slate-200 text-xs sm:text-sm rounded-lg border border-white/10 px-2 py-2 min-w-0 max-w-[11rem] sm:max-w-none focus:outline-none focus:ring-1 focus:ring-blue-500/50">
                        <option value="auto">Auto (fastest)</option>
                        <option value="ollama">Ollama (local)</option>
                        <option value="openai">OpenAI</option>
                        <option value="groq">Groq</option>
                        <option value="openrouter">OpenRouter</option>
                        <option value="gemini">Gemini</option>
                    </select>
                    <label for="response-detail-select" class="text-[10px] font-semibold uppercase tracking-wider text-slate-500 whitespace-nowrap">Answer</label>
                    <select id="response-detail-select" title="Response length"
                        class="bg-slate-800/90 text-slate-200 text-xs sm:text-sm rounded-lg border border-white/10 px-2 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500/50">
                        <option value="standard">Standard</option>
                        <option value="detailed">Detailed</option>
                    </select>
                </div>
                <input type="text" id="chat-input" placeholder="Type your question about drone building, troubleshooting..."
                    class="flex-grow min-w-0 bg-transparent border-none focus:ring-0 text-slate-200 placeholder-slate-500 px-4 py-2 order-1 sm:order-2">
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all shadow-lg active:scale-95 shrink-0 order-3 self-end sm:self-auto">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </section>
    </main>

    <!-- Global Scripts -->
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

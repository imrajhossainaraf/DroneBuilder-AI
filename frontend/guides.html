<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroneMate Guides | Build Step-by-Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-y-auto">

    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-drone text-white text-xl"></i></div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">DroneMate</h1>
        </div>
        <div class="flex items-center gap-6">
            <a href="index.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Chat</a>
            <a href="components.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Components</a>
            <a href="#" class="text-sm font-medium text-white transition-colors">Guides</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 space-y-12">
        <header class="text-center space-y-4">
            <h2 class="text-4xl font-bold text-white tracking-tight">Build Guides</h2>
            <p class="text-slate-400 max-w-xl mx-auto">Master the art of drone building with our curated, step-by-step masterclasses.</p>
        </header>

        <section id="guides-list" class="space-y-6">
            <!-- Guides list will be loaded here -->
            <div class="animate-pulse glass-panel rounded-3xl h-32"></div>
            <div class="animate-pulse glass-panel rounded-3xl h-32"></div>
        </section>

        <!-- Selected Guide Detail Modal/Overlay -->
        <div id="guide-detail" class="hidden glass-panel rounded-3xl p-8 space-y-8 animate-in fade-in duration-500">
            <!-- Selected guide content will be injected here -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/guides.js"></script>
</body>
</html>
